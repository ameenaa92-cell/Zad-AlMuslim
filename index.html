        const DB_NAME = "ZadQuranDB";
        const STORE_NAME = "Pages";

        const openOfflineDB = () => {
            return new Promise((resolve, reject) => {
                const request = window.indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
            });
        };

        const saveQuranToOfflineDB = async (pagesObject) => {
            const db = await openOfflineDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                for (const pageNum in pagesObject) {
                    store.put(pagesObject[pageNum], parseInt(pageNum));
                }
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const getPageFromOfflineDB = async (pageNum) => {
            const db = await openOfflineDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(pageNum);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const checkQuranExistsOffline = async () => {
            const db = await openOfflineDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const request = store.count();
                request.onsuccess = () => resolve(request.result >= 604);
                request.onerror = () => resolve(false);
            });
        };

                    setIsQuranDownloaded(false);
                    alert("تم حذف المصحف المحمل.");
                }
            };

            // دالة فتح الصفحة (ذكية: تجلب من الهاتف إذا متوفر، أو من الإنترنت)
            const openPage = async (pageNum) => {
                if(pageNum < 1 || pageNum > 604) return;
                setReadingPage(pageNum);
                setPageData(null);
                setQuranLoading(true);
                window.scrollTo(0, 0);
                
                if (isQuranDownloaded) {
                    try {
                        const localData = await getPageFromOfflineDB(pageNum);
                        if (localData) {
                            setPageData(localData);
                            setQuranLoading(false);
                            return; // توقف هنا، لقد جلبنا البيانات من الهاتف بسرعة البرق
                        }
                    } catch (e) { console.error("خطأ في قراءة القاعدة المحلية", e); }
                }
                
                // إذا لم يكن محملاً، اجلبه من الإنترنت
                fetch(`https://api.alquran.cloud/v1/page/${pageNum}/quran-uthmani`)
                    .then(res => res.json())
                    .then(data => {
                        setPageData(data.data);
                        setQuranLoading(false);
                    })
                    .catch(err => {
                        console.log(err);
                        setQuranLoading(false);
                        alert("لا يوجد اتصال بالإنترنت! يرجى تنزيل المصحف أولاً لتقرأ بدون إنترنت.");
                    });
            };

            const saveBookmark = () => {
                setQuranBookmark(readingPage);
                alert(`تم حفظ العلامة عند الصفحة ${readingPage} بنجاح!`);
            };

            const handleJumpPage = () => {
                const page = parseInt(jumpPageInput);
                if (page >= 1 && page <= 604) {
                    openPage(page);
                    setJumpPageInput('');
                } else {
                    alert('الرجاء إدخال رقم صفحة صحيح بين 1 و 604');
                }
            };

            const handleTouchStart = (e) => {
                setTouchStartPos({ x: e.changedTouches[0].screenX, y: e.changedTouches[0].screenY });
            };

            const handleTouchEnd = (e) => {
                if (!readingPage) return;
                const endX = e.changedTouches[0].screenX;
                const endY = e.changedTouches[0].screenY;
                const diffX = touchStartPos.x - endX;
                const diffY = touchStartPos.y - endY;

                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 60) {
                    if (diffX > 0 && readingPage < 604) openPage(readingPage + 1);
                    else if (diffX < 0 && readingPage > 1) openPage(readingPage - 1);
                }
            };

            const filteredSurahs = useMemo(() => {
                if (!quranSearchQuery) return surahsList;
                return surahsList.filter(s => s.name.includes(quranSearchQuery));
            }, [surahsList, quranSearchQuery]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 60000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    if (usr) { setUser(usr); loadDataFromCloud(usr.uid); }
                    else {
                        setUser(null); setHabits({}); setVocab([]); setQuran({s:'', p:'', a:'', j:''});
                        setHistory([]); setSunnahHabits({}); setPrayerOffsets({ Fajr: 0, Dhuhr: 0, Asr: 0, Maghrib: 0, Isha: 0 });
                    }
                    setLoadingAuth(false);
                });
                return unsubscribe;
            }, []);

            useEffect(() => {
                const cityObj = CITIES.find(c => c.value === city);
                const country = cityObj ? cityObj.country : 'Iraq';
                const dateStr = currentTime.toLocaleDateString('en-GB').replace(/\//g, '-');

                fetch(`https://api.aladhan.com/v1/timingsByCity/${dateStr}?city=${city}&country=${country}&method=${calcMethod}`)
                    .then(r => r.json())
                    .then(d => { if (d.data) setPrayers(d.data.timings); })
                    .catch(e => console.log("خطأ في جلب المواقيت", e));
                
                localStorage.setItem('m_city', city);
                localStorage.setItem('m_calc_method', calcMethod);
            }, [city, calcMethod, currentTime.toLocaleDateString()]);

            useEffect(() => {
                if (history.length === 0) { setStreak(0); return; }
                let count = 0;
                const sorted = [...history].sort((a,b) => new Date(b.date) - new Date(a.date));
                for (let i = 0; i < sorted.length; i++) {
                    const expectedDate = new Date(currentTime);
                    expectedDate.setDate(expectedDate.getDate() - i);
                    const expKey = expectedDate.toLocaleDateString('en-CA');
                    const dayEntry = sorted.find(h => h.date === expKey);
                    if (dayEntry && dayEntry.score >= 60) count++;
                    else break;
                }
                setStreak(count);
            }, [history, currentTime]);

            const loadDataFromCloud = async (uid) => {
                try {
                    const doc = await db.collection('users').doc(uid).get();
                    if (doc.exists) {
                        const d = doc.data();
                        setHabits(d.habits || {}); setVocab(d.vocab || []);
                        setQuran(d.quran || {s:'', p:'', a:'', j:''});
                        setHistory(d.history || []); setSunnahHabits(d.sunnahHabits || {});
                        if(d.prayerOffsets) setPrayerOffsets(d.prayerOffsets);
                        if(d.calcMethod) setCalcMethod(d.calcMethod);
                        if(d.quranBookmark) setQuranBookmark(d.quranBookmark);
                    }
                } catch (e) { console.error(e); }
            };

            const calculateScore = (dateKey = todayKey, habitsData = habits) => {
                const keys = ['f','d','a','m','i','q','az','sw','ist'];
                const done = keys.filter(k => habitsData[dateKey + k]).length;
                return Math.round((done / keys.length) * 100);
            };

            const calculateSunnahScore = (dateKey = todayKey) => {
                const done = SUNNAH_LIST.filter(s => sunnahHabits[dateKey + s.k]).length;
                return Math.round((done / SUNNAH_LIST.length) * 100);
            };

            const syncToCloud = async () => {
                if (!user) return;
                setSyncStatus('saving');
                try {
                    let updatedHistory = [...history];
                    
                    if (!updatedHistory.find(h => h.date === todayKey)) {
                        updatedHistory.unshift({ date: todayKey, score: calculateScore(todayKey) });
                    }

                    updatedHistory = updatedHistory.map(h => ({
                        ...h,
                        score: calculateScore(h.date, habits)
                    })).sort((a,b) => new Date(b.date) - new Date(a.date));

                    await db.collection('users').doc(user.uid).set({
                        habits, sunnahHabits, vocab, quran, history: updatedHistory.slice(0, 100),
                        prayerOffsets, calcMethod, quranBookmark, lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    
                    setHistory(updatedHistory.slice(0, 100));
                    setSyncStatus('saved');
                } catch (e) { setSyncStatus('error'); console.error(e); }
            };

            useEffect(() => {
                if (!user) return;
                const timer = setTimeout(syncToCloud, 1000);
                return () => clearTimeout(timer);
            }, [habits, sunnahHabits, vocab, quran, prayerOffsets, calcMethod, quranBookmark]);

            const handleEmailAuth = () => {
                if (!emailInput || !passInput) { alert("يرجى إدخال البريد الإلكتروني وكلمة المرور"); return; }
                if (isSignUpMode) {
                    auth.createUserWithEmailAndPassword(emailInput, passInput)
                    .catch((error) => {
                        if (error.code === 'auth/email-already-in-use') alert('هذا البريد الإلكتروني مستخدم مسبقاً.');
                        else if (error.code === 'auth/weak-password') alert('كلمة المرور ضعيفة جداً. (يجب أن تكون 6 أحرف على الأقل)');
                        else if (error.code === 'auth/operation-not-allowed') alert('ميزة البريد الإلكتروني غير مفعلة من إعدادات Firebase.');
                        else alert('خطأ: ' + error.message);
                    });
                } else {
                    auth.signInWithEmailAndPassword(emailInput, passInput)
                    .catch((error) => {
                        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') alert('البريد الإلكتروني أو كلمة المرور غير صحيحة.');
                        else alert('خطأ: ' + error.message);
                    });
                }
            };

            const handleGuestLogin = () => {
                auth.signInAnonymously().catch((error) => {
                    if (error.code === 'auth/operation-not-allowed') alert("⚠️ الميزة مغلقة حالياً!\nلتفعيلها: اذهب لإعدادات حسابك في Firebase ثم فعل خيار Anonymous.");
                    else alert("حدث خطأ أثناء الدخول كضيف: " + error.message);
                });
            };

            const toggle = (id, dateKey = todayKey) => setHabits(prev => ({...prev, [dateKey + id]: !prev[dateKey + id]}));
            const toggleSunnah = (id, dateKey = todayKey) => setSunnahHabits(prev => ({...prev, [dateKey + id]: !prev[dateKey + id]}));
            
            const deleteDailyRecord = (dateKey) => {
                if(window.confirm('هل أنت متأكد من حذف إنجاز هذا اليوم بالكامل؟')) {
                    const newHistory = history.filter(h => h.date !== dateKey);
                    const newHabits = {...habits};
                    const newSunnah = {...sunnahHabits};
                    
                    Object.keys(newHabits).forEach(k => { if(k.startsWith(dateKey)) delete newHabits[k]; });
                    Object.keys(newSunnah).forEach(k => { if(k.startsWith(dateKey)) delete newSunnah[k]; });
                    
                    setHistory(newHistory); setHabits(newHabits); setSunnahHabits(newSunnah);
                    setEditingDate(null);
                }
            };

            const resetAllRecords = () => {
                if(window.confirm('تنبيه هام! ⚠️\nهل أنت متأكد من مسح جميع السجلات والإنجازات السابقة؟ لا يمكن التراجع عن هذه الخطوة.')) {
                    setHistory([]); setHabits({}); setSunnahHabits({});
                }
            };

            const adjustTime = useCallback((timeStr, offset) => {
                if (!timeStr) return '...';
                const base = timeStr.split(' ')[0];
                let [h, m] = base.split(':').map(Number);
                let totalMins = h * 60 + m + (offset || 0);
                let newH = Math.floor(totalMins / 60) % 24;
                if (newH < 0) newH += 24;
                let newM = ((totalMins % 60) + 60) % 60;
                return `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`;
            }, []);

            const changeOffset = (prayerKey, amount) => {
                setPrayerOffsets(prev => ({...prev, [prayerKey]: prev[prayerKey] + amount}));
            };

            const nextPrayerInfo = useMemo(() => {
                if (!prayers.Fajr) return null;
                const now = currentTime;
                const currentMins = now.getHours() * 60 + now.getMinutes();
                const prayerList = [
                    { id: 'f', key: 'Fajr', name: 'الفجر', icon: '🌙' },
                    { id: 'd', key: 'Dhuhr', name: 'الظهر', icon: '☀️' },
                    { id: 'a', key: 'Asr', name: 'العصر', icon: '🌤️' },
                    { id: 'm', key: 'Maghrib', name: 'المغرب', icon: '🌅' },
                    { id: 'i', key: 'Isha', name: 'العشاء', icon: '⭐' }
                ];
                let nextPrayer = null; let minDiff = Infinity;
                for (let p of prayerList) {
                    const adjustedTime = adjustTime(prayers[p.key], prayerOffsets[p.key]);
                    if(adjustedTime === '...') continue;
                    const [h, m] = adjustedTime.split(':').map(Number);
                    const pMins = h * 60 + m;
                    if (pMins > currentMins && (pMins - currentMins) < minDiff) { minDiff = pMins - currentMins; nextPrayer = p; }
                }
                if (!nextPrayer) {
                    const fajrTime = adjustTime(prayers.Fajr, prayerOffsets.Fajr);
                    const [h, m] = fajrTime.split(':').map(Number);
                    minDiff = (24 * 60 - currentMins) + (h * 60 + m);
                    nextPrayer = prayerList[0];
                }
                const diffH = Math.floor(minDiff / 60); const diffM = minDiff % 60;
                const timeStr = diffH > 0 ? `${diffH} س و ${diffM} د` : `${diffM} دقيقة`;
                return { ...nextPrayer, timeRemaining: timeStr };
            }, [prayers, prayerOffsets, currentTime, adjustTime]);

            const upcomingEvents = useMemo(() => {
                const now = new Date(currentTime);
                now.setHours(0,0,0,0);
                const twoWeeksLater = new Date(now);
                twoWeeksLater.setDate(now.getDate() + 14);

                return ISLAMIC_EVENTS.filter(e => {
                    const eDate = new Date(e.gDate);
                    return eDate >= now && eDate <= twoWeeksLater;
                });
            }, [currentTime]);

            const calDays = useMemo(() => {
                const year = calMonth.getFullYear(); const month = calMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let d = 1; d <= daysInMonth; d++) {
                    const date = new Date(year, month, d);
                    const key = date.toLocaleDateString('en-CA');
                    const entry = history.find(h => h.date === key);
                    
                    const hijriDateObj = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'numeric'}).formatToParts(date);
                    const hDayStr = hijriDateObj.find(p => p.type === 'day')?.value;
                    const hDayNum = parseInt(hDayStr) || 0;
                    const isWhiteDay = hDayNum >= 13 && hDayNum <= 15;

                    days.push({ 
                        gDay: d, hDay: hDayStr, key, score: entry ? entry.score : null, 
                        isToday: key === todayKey, isWhiteDay
                    });
                }
                return days;
            }, [calMonth, history]);

            const groupedHistoryArray = useMemo(() => {
                const groups = {};
                const sortedHistory = [...history].sort((a, b) => new Date(b.date) - new Date(a.date));

                sortedHistory.forEach(h => {
                    const dateObj = new Date(h.date);
                    const year = dateObj.getFullYear();
                    const monthStr = dateObj.toLocaleDateString('ar-EG', { month: 'long' });
                    const monthNum = dateObj.getMonth();
                    const groupKey = `${year}-${monthNum}`;

                    if (!groups[groupKey]) {
                        groups[groupKey] = {
                            year,
                            monthStr,
                            monthNum,
                            records: [],
                            totalScore: 0
                        };
                    }
                    groups[groupKey].records.push(h);
                    groups[groupKey].totalScore += h.score;
                });

                return Object.values(groups).sort((a, b) => {
                    if (a.year !== b.year) return b.year - a.year;
                    return b.monthNum - a.monthNum;
                });
            }, [history]);

            const score = calculateScore(todayKey);
            const sunnahScore = calculateSunnahScore(todayKey);

            if (loadingAuth) return (
                <div className="h-screen w-full flex flex-col items-center justify-center" style={{background:'var(--navy)'}}>
                    <div className="text-6xl mb-4 glow-text pulse-gold">🕌</div><div className="text-white font-black text-lg">زاد المُسلم</div><div className="text-sm mt-2 font-bold" style={{color:'var(--gold)'}}>جاري التحقق...</div>
                </div>
            );

            if (!user) return (
                <div className="w-full max-w-md mx-auto h-screen flex flex-col items-center justify-center p-6 text-center islamic-pattern overflow-y-auto custom-scroll" style={{background:'var(--navy)'}}>
                    <div className="text-6xl mb-4 glow-text mt-8">🕌</div><h1 className="text-2xl font-black text-white mb-1">زاد المُسلم</h1>
                    <p className="font-bold text-xs mb-6" style={{color:'var(--gold)'}}>تتبع طاعاتك · ابنِ عاداتك</p>
                    
                    <div className="w-full bg-white/10 p-4 rounded-[2rem] border border-white/20 mb-4 backdrop-blur-md shadow-xl">
                        <div className="flex gap-2 mb-4 bg-[#0F1F3D]/50 p-1.5 rounded-2xl">
                            <button onClick={()=>setIsSignUpMode(false)} className={`flex-1 py-2.5 rounded-xl text-xs font-black transition-all ${!isSignUpMode ? 'bg-white shadow-sm' : 'text-white/60'}`} style={!isSignUpMode ? {color:'var(--navy)'} : {}}>تسجيل الدخول</button>
                            <button onClick={()=>setIsSignUpMode(true)} className={`flex-1 py-2.5 rounded-xl text-xs font-black transition-all ${isSignUpMode ? 'bg-white shadow-sm' : 'text-white/60'}`} style={isSignUpMode ? {color:'var(--navy)'} : {}}>حساب جديد</button>
                        </div>
                        <input type="email" value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="البريد الإلكتروني" className="w-full mb-3 p-4 rounded-2xl text-sm font-bold outline-none border-2 transition-colors focus:border-[#C9A84C]" style={{background:'white', color:'var(--navy)', borderColor:'transparent'}} dir="ltr" />
                        <input type="password" value={passInput} onChange={e=>setPassInput(e.target.value)} placeholder="كلمة المرور" className="w-full mb-4 p-4 rounded-2xl text-sm font-bold outline-none border-2 transition-colors focus:border-[#C9A84C]" style={{background:'white', color:'var(--navy)', borderColor:'transparent'}} dir="ltr" />
                        <button onClick={handleEmailAuth} className="w-full p-4 rounded-2xl font-black text-white active:scale-95 transition shadow-lg text-sm" style={{background:'linear-gradient(135deg, var(--gold-dark), var(--gold))'}}>
                            {isSignUpMode ? 'إنشاء حساب جديد' : 'دخول إلى حسابي'}
                        </button>
                    </div>

                    <div className="w-full flex items-center justify-center gap-3 my-2 opacity-50">
                        <div className="h-px flex-1 bg-white"></div><span className="text-white text-[10px]">أو طرق أخرى</span><div className="h-px flex-1 bg-white"></div>
                    </div>
                    
                    <button onClick={() => auth.signInWithPopup(googleProvider)} className="w-full bg-white p-3.5 rounded-2xl font-black flex items-center justify-center gap-3 shadow-lg active:scale-95 transition text-slate-700 mt-2 text-sm" style={{border:'2px solid rgba(201,168,76,0.3)'}}>
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-4 h-4"/> الدخول بحساب Google
                    </button>
                    <button onClick={handleGuestLogin} className="w-full bg-transparent p-3.5 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 transition text-white/90 border mt-3 text-sm" style={{borderColor:'rgba(255,255,255,0.15)'}}>
                        <i className="fa-solid fa-user-secret"></i> الدخول كضيف (مؤقت)
                    </button>
                    <p className="text-[8px] mt-4 mb-8 text-white/50 leading-relaxed">الدخول كضيف يحفظ بياناتك في هذا الجهاز فقط. يفضل استخدام بريد إلكتروني لحفظ بياناتك.</p>
                </div>
            );

            return (
                <div className="w-full max-w-md mx-auto h-screen flex flex-col relative overflow-hidden" style={{background:'var(--cream)'}}>
                    
                    {!readingPage && (
                        <header className="shrink-0 pt-10 pb-16 px-6 relative overflow-hidden" style={{background: `linear-gradient(160deg, var(--navy) 0%, var(--navy-light) 100%)`, borderBottomLeftRadius: '3rem', borderBottomRightRadius: '3rem'}}>
                            <div className="absolute inset-0 opacity-10 islamic-pattern"></div>
                            <div className="relative z-10 flex justify-between items-start">
                                <div>
                                    <h1 className="text-2xl font-black text-white mb-1">زاد المُسلم</h1>
                                    <p className="text-xs font-bold mb-0.5" style={{color:'var(--gold)'}}>{hijriDate}</p>
                                    <p className="text-[10px] font-bold" style={{color:'rgba(255,255,255,0.4)'}}>{gregorianDate}</p>
                                </div>
                                <div className="flex flex-col items-end gap-2">
                                    <div className="flex items-center gap-2">
                                        <div className="bg-white/10 px-3 py-1.5 rounded-xl border flex items-center gap-1.5" style={{borderColor:'rgba(255,255,255,0.1)'}}>
                                            <span className="text-[10px] font-black" style={{color: getUserRank.color}}>{getUserRank.title}</span>
                                            <span className="text-sm">{getUserRank.icon}</span>
                                        </div>
                                        <div className="cursor-pointer" onClick={() => setActiveTab('settings')}>
                                            <img src={user.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'} className={`w-10 h-10 rounded-xl border-2 shadow-md ${user.isAnonymous || !user.photoURL ? 'bg-white p-1' : ''}`} style={{borderColor:'var(--gold)'}} onError={e => {e.target.style.display='none'}}/>
                                        </div>
                                    </div>
                                    {streak > 0 && (
                                        <div className="flex items-center gap-1 px-3 py-1 rounded-lg streak-fire" style={{background:'rgba(201,168,76,0.15)'}}>
                                            <i className="fa-solid fa-fire text-[10px]" style={{color:'var(--gold)'}}></i>
                                            <span className="text-[11px] font-black" style={{color:'var(--gold)'}}>{streak} أيام التزام</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </header>
                    )}

                    <main className={`flex-1 px-4 ${readingPage ? 'pt-4' : '-mt-6'} relative z-20 overflow-y-auto custom-scroll ${!readingPage ? 'pb-32' : 'pb-0'}`} style={readingPage ? {background:'var(--paper)'} : {}}>

                        {/* --- قسم قراءة المصحف (مع تفعيل السحب باللمس وإلغاء الأزرار السفلية) --- */}
                        {readingPage && (
                            <div 
                                className="tab-animate h-full relative flex flex-col"
                                onTouchStart={handleTouchStart}
                                onTouchEnd={handleTouchEnd}
                            >
                                <div className="sticky top-0 bg-[#FDFBF7]/95 backdrop-blur-md z-30 pb-4 pt-2 mb-4 border-b flex items-center justify-between px-1" style={{borderColor:'rgba(201,168,76,0.2)'}}>
                                    <button onClick={() => {setReadingPage(null); setPageData(null);}} className="w-10 h-10 rounded-full flex items-center justify-center bg-white shadow-sm border active:scale-95 transition text-slate-600" style={{borderColor:'rgba(0,0,0,0.05)'}}>
                                        <i className="fa-solid fa-arrow-right"></i>
                                    </button>
                                    <div className="text-center">
                                        <h2 className="font-black text-base quran-text" style={{color:'var(--navy)'}}>الصفحة {readingPage}</h2>
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        <button onClick={saveBookmark} title="حفظ هذه الصفحة للعودة إليها لاحقاً" className={`w-9 h-9 rounded-xl flex items-center justify-center shadow-sm border active:scale-95 transition ${quranBookmark === readingPage ? 'bg-[#C9A84C] text-white border-[#C9A84C]' : 'bg-white text-[#C9A84C]'}`} style={{borderColor:'rgba(201,168,76,0.3)'}}>
                                            <i className={`fa-solid fa-bookmark text-sm`}></i>
                                        </button>

                            {upcomingEvents.length > 0 && (
                                <div className="bg-rose-50 border-2 border-rose-100 rounded-2xl p-4 mb-4 flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-rose-100 text-rose-500 flex items-center justify-center text-lg"><i className="fa-solid fa-bell"></i></div>
                                    <div>
                                        <p className="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-1">مناسبة قريبة</p>
                                        <p className="text-sm font-black text-rose-900">{upcomingEvents[0].name}</p>
                                        <p className="text-[10px] font-bold text-rose-700">{upcomingEvents[0].hijri} (الموافق {new Date(upcomingEvents[0].gDate).toLocaleDateString('ar-EG', {month:'long', day:'numeric'})})</p>
                                    </div>
                                </div>
                            )}

                            <div className="card-glass rounded-[2.5rem] p-5 shadow-lg mb-5 border" style={{borderColor:'rgba(201,168,76,0.3)'}}>
                                <div className="flex items-center justify-between mb-5">
                                    <button onClick={() => { const d = new Date(calMonth); d.setMonth(d.getMonth() - 1); setCalMonth(d); }} className="w-9 h-9 rounded-xl flex items-center justify-center" style={{background:'rgba(201,168,76,0.1)'}}><i className="fa-solid fa-chevron-right text-xs" style={{color:'var(--gold)'}}></i></button>
                                    <div className="text-center">
                                        <div className="font-black text-base" style={{color:'var(--navy)'}}>{new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {month:'long', year:'numeric'}).format(calMonth)}</div>
                                        <div className="text-[10px] font-bold" style={{color:'var(--gold-dark)'}}>{calMonth.toLocaleDateString('ar-EG', {month:'long', year:'numeric'})}</div>
                                    </div>
                                    <button onClick={() => { const d = new Date(calMonth); d.setMonth(d.getMonth() + 1); setCalMonth(d); }} className="w-9 h-9 rounded-xl flex items-center justify-center" style={{background:'rgba(201,168,76,0.1)'}}><i className="fa-solid fa-chevron-left text-xs" style={{color:'var(--gold)'}}></i></button>
                                </div>
                                <div className="grid grid-cols-7 mb-2">{['أح','إث','ثل','أر','خم','جم','سب'].map((d,i) => (<div key={i} className="text-center text-[9px] font-black py-1" style={{color:'rgba(0,0,0,0.3)'}}>{d}</div>))}</div>
                                <div className="grid grid-cols-7 gap-1.5">
                                    {calDays.map((d, i) => (
                                        <div key={i} className="aspect-square flex items-center justify-center">
                                            {d ? (
                                                <div onClick={() => { if(d.key <= todayKey) setEditingDate(d.key); }} className={`w-full h-full flex flex-col items-center justify-center transition-all cursor-pointer ${d.isToday ? 'calendar-day-active' : d.score !== null && d.score >= 70 ? 'calendar-day-done' : d.score !== null && d.score > 0 ? 'calendar-day-partial' : 'calendar-day-empty'} ${d.isWhiteDay && !d.isToday && !(d.score>=70) ? 'calendar-day-white-days' : ''}`} title={d.key <= todayKey ? 'انقر لتعديل هذا اليوم' : ''}>
                                                    <span className="text-[12px] font-black leading-none mb-0.5" style={!d.isToday && d.score === null ? {color:'var(--navy)'} : d.isToday || d.score >= 70 ? {color:'white'} : {color:'var(--navy)'}}>{d.hDay}</span>
                                                    <span className="text-[8px] font-bold opacity-70 leading-none" style={d.isToday || d.score >= 70 ? {color:'white'} : {color:'rgba(0,0,0,0.4)'}}>{d.gDay}</span>
                                                </div>
                                            ) : <div className="w-full h-full"></div>}
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-center gap-3 mt-4 pt-3 border-t" style={{borderColor:'rgba(0,0,0,0.05)'}}>
                                    <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-full calendar-day-done"></div><span className="text-[8px] font-bold text-slate-500">ممتاز</span></div>
                                    <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-full calendar-day-active"></div><span className="text-[8px] font-bold text-slate-500">اليوم</span></div>
                                    <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-full bg-transparent border-b-2" style={{borderColor:'var(--gold-dark)'}}></div><span className="text-[8px] font-bold text-slate-500">أيام بيض</span></div>
                                </div>
                            </div>

                            <div className="flex items-center justify-between mb-4 px-1 mt-6">
                                <h2 className="text-[10px] font-black uppercase tracking-widest" style={{color:'rgba(0,0,0,0.3)'}}>سجل الإنجازات المفصل (اضغط للتعديل)</h2>
                            </div>
                            
                            {groupedHistoryArray.length === 0 ? (
                                <div className="text-center py-8 font-bold text-xs" style={{color:'rgba(0,0,0,0.25)'}}>لا يوجد سجل محفوظ</div>
                            ) : (
                                groupedHistoryArray.map((group, groupIdx) => {
                                    const monthlyAverage = Math.round(group.totalScore / group.records.length);
                                    return (
                                        <div key={groupIdx} className="mb-6">
                                            <div className="flex items-center justify-between mb-3 px-1">
                                                <h3 className="font-black text-sm" style={{color:'var(--navy)'}}>
                                                    {group.monthStr} {group.year}
                                                </h3>
                                                <div className="bg-white px-3 py-1 rounded-xl border flex items-center gap-2 shadow-sm" style={{borderColor:'rgba(201,168,76,0.3)'}}>
                                                    <span className="text-[9px] font-bold text-slate-500">إنجاز الشهر:</span>
                                                    <span className="text-xs font-black" style={{color:'var(--gold-dark)'}}>{monthlyAverage}%</span>
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                {group.records.map((h, i) => (
                                                    <div key={i} onClick={() => setEditingDate(h.date)} className="bg-white p-4 rounded-2xl flex justify-between items-center border cursor-pointer active:scale-[0.98] transition-transform" style={{borderColor:'rgba(0,0,0,0.06)'}}>
                                                        <div className="font-bold text-sm flex items-center gap-2" style={{color:'var(--navy)'}}>
                                                            <i className="fa-solid fa-pen text-[10px] text-slate-300"></i>
                                                            {new Date(h.date).toLocaleDateString('ar-EG', {weekday:'long', day:'numeric'})}
                                                        </div>
                                                        <div className="text-xs font-black px-3 py-1 rounded-xl" style={h.score >= 70 ? {background:'rgba(42,127,111,0.12)', color:'var(--teal)'} : {background:'rgba(201,168,76,0.12)', color:'var(--gold-dark)'}}>{h.score}%</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>}

                        {!readingPage && activeTab === 'settings' && <div className="tab-animate">
                            <div className="card-glass rounded-[2.5rem] p-6 shadow-lg mb-6 border" style={{borderColor:'rgba(201,168,76,0.2)'}}>
                                <div className="flex flex-col items-center mb-6 border-b pb-6" style={{borderColor:'rgba(0,0,0,0.06)'}}>
                                    <img src={user.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'} className={`w-20 h-20 rounded-full border-4 mb-3 shadow-md ${user.isAnonymous || !user.photoURL ? 'bg-white p-2' : ''}`} style={{borderColor:'var(--gold)'}} onError={e => {e.target.style.display='none'}}/>
                                    <h2 className="font-black text-lg" style={{color:'var(--navy)'}}>{user.isAnonymous ? 'مستخدم ضيف' : (user.displayName || 'المستخدم')}</h2>
                                    <p className="text-[10px] font-bold mt-1 mb-3" style={{color:'rgba(0,0,0,0.4)'}}>{user.isAnonymous ? 'تُحفظ بياناتك محلياً بشكل مؤقت' : user.email}</p>
                                    
                                    <div className="bg-slate-50 px-4 py-2 rounded-xl border flex items-center gap-2" style={{borderColor:'rgba(0,0,0,0.05)'}}>
                                        <span className="text-[10px] font-bold text-slate-500">مستواك الحالي:</span>
                                        <span className="text-sm font-black" style={{color: getUserRank.color}}>{getUserRank.title} {getUserRank.icon}</span>
                                    </div>
                                </div>

                                <div className="mb-6">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest mb-3 px-1" style={{color:'var(--teal)'}}><i className="fa-solid fa-location-dot"></i> الموقع وحساب المواقيت</h3>
                                    <div className="bg-white p-3 rounded-2xl border mb-3" style={{borderColor:'rgba(0,0,0,0.06)'}}>
                                        <label className="block text-[10px] font-bold mb-1" style={{color:'rgba(0,0,0,0.4)'}}>المحافظة / المدينة</label>
                                        <select value={city} onChange={e => setCity(e.target.value)} className="w-full font-black text-sm border-0 outline-none" style={{color:'var(--navy)'}}>
                                            {CITIES.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
                                        </select>
                                    </div>
                                    <div className="bg-white p-3 rounded-2xl border" style={{borderColor:'rgba(0,0,0,0.06)'}}>
                                        <label className="block text-[10px] font-bold mb-1" style={{color:'rgba(0,0,0,0.4)'}}>طريقة الحساب المعتمدة</label>
                                        <select value={calcMethod} onChange={e => setCalcMethod(parseInt(e.target.value))} className="w-full font-bold text-xs border-0 outline-none" style={{color:'var(--navy)'}}>
                                            {CALC_METHODS.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <div className="mb-6">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest mb-3 px-1" style={{color:'var(--teal)'}}><i className="fa-solid fa-clock"></i> التعديل اليدوي للمواقيت (بالدقائق)</h3>
                                    <p className="text-[9px] font-bold mb-2 px-1 leading-relaxed" style={{color:'rgba(0,0,0,0.4)'}}>عدّل الوقت ليطابق مسجد الحي، وسيتم حفظ التعديل سحابياً.</p>
                                    <div className="bg-white rounded-2xl border p-2" style={{borderColor:'rgba(0,0,0,0.06)'}}>
                                        {['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].map(p => (
                                            <div key={p} className="flex items-center justify-between p-2 border-b last:border-0" style={{borderColor:'rgba(0,0,0,0.03)'}}>
                                                <span className="font-bold text-sm" style={{color:'var(--navy)'}}>{p==='Fajr'?'الفجر':p==='Dhuhr'?'الظهر':p==='Asr'?'العصر':p==='Maghrib'?'المغرب':'العشاء'}</span>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={()=>changeOffset(p, -1)} className="w-8 h-8 rounded-lg bg-rose-50 text-rose-500 font-black">-</button>
                                                    <span className="w-6 text-center font-black text-sm" style={{color:'var(--navy)'}} dir="ltr">{prayerOffsets[p]>0?'+'+prayerOffsets[p]:prayerOffsets[p]}</span>
                                                    <button onClick={()=>changeOffset(p, 1)} className="w-8 h-8 rounded-lg bg-emerald-50 text-teal-600 font-black">+</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="mb-6 border-t pt-6" style={{borderColor:'rgba(0,0,0,0.06)'}}>
                                    <h3 className="text-[10px] font-black uppercase tracking-widest mb-3 px-1 text-rose-500"><i className="fa-solid fa-triangle-exclamation"></i> منطقة الخطر</h3>
                                    <button onClick={resetAllRecords} className="w-full bg-rose-50 text-rose-600 p-4 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95 transition border border-rose-100">
                                        <i className="fa-solid fa-trash-can"></i> تصفير جميع السجلات
                                    </button>
                                </div>

                                <div>
                                    <button onClick={() => auth.signOut()} className="w-full bg-slate-100 text-slate-600 p-4 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95 transition">
                                        <i className="fa-solid fa-arrow-right-from-bracket"></i> تسجيل الخروج
                                    </button>
                                </div>
                            </div>
                        </div>}

                        {!readingPage && activeTab === 'vocab' && <div className="tab-animate">
                            <div className="card-glass rounded-[2.5rem] p-5 shadow-lg border mb-6" style={{borderColor:'rgba(201,168,76,0.2)', background:'linear-gradient(135deg, rgba(250,246,238,0.98), rgba(240,232,213,0.9))'}}>
                                <h2 className="font-black text-sm mb-4 flex items-center gap-2" style={{color:'var(--gold-dark)'}}><i className="fa-solid fa-book-open text-base"></i> مفردة قرآنية جديدة</h2>
                                <input value={newWord.w} onChange={e => setNewWord({...newWord, w:e.target.value})} className="w-full p-4 rounded-2xl mb-3 text-sm font-bold border bg-white/80" style={{color:'var(--navy)', borderColor:'rgba(201,168,76,0.2)'}} placeholder="الكلمة أو العبارة..." />
                                <textarea value={newWord.m} onChange={e => setNewWord({...newWord, m:e.target.value})} className="w-full p-4 rounded-2xl mb-4 text-sm font-bold border bg-white/80 h-24 resize-none" style={{color:'var(--navy)', borderColor:'rgba(201,168,76,0.2)'}} placeholder="المعنى والشرح..."></textarea>
                                <button onClick={() => { if(newWord.w && newWord.m) { setVocab([{...newWord, id:Date.now()}, ...vocab]); setNewWord({w:'', m:''}); } }} className="w-full p-4 rounded-2xl font-black text-white shadow-lg active:scale-95 transition text-sm" style={{background:'linear-gradient(135deg, var(--gold-dark), var(--gold))'}}>حفظ في السحابة</button>
                            </div>
                            <div className="space-y-3">{vocab.map(v => (<div key={v.id} className="bg-white p-5 rounded-[2rem] border-r-4 relative border" style={{borderRightColor:'var(--gold)', borderColor:'rgba(0,0,0,0.06)'}}><button onClick={() => setVocab(vocab.filter(x => x.id !== v.id))} className="absolute left-4 top-4 w-7 h-7 rounded-xl flex items-center justify-center text-xs transition-all" style={{color:'rgba(0,0,0,0.15)', background:'rgba(0,0,0,0.04)'}}><i className="fa-solid fa-xmark"></i></button><h4 className="font-black text-xl mb-2" style={{color:'var(--navy)'}}>{v.w}</h4><p className="text-sm font-bold leading-relaxed p-3 rounded-2xl" style={{color:'rgba(0,0,0,0.6)', background:'rgba(250,246,238,0.8)'}}>{v.m}</p></div>))}</div>
                        </div>}

                    </main>

                    {/* نافذة تعديل السجل للأيام السابقة */}
                    {editingDate && (
                        <div className="fixed inset-0 z-[100] flex flex-col justify-end bg-black/60 backdrop-blur-sm" style={{animation: 'fadeIn 0.2s ease-out'}}>
                            <div className="w-full max-w-md mx-auto bg-white rounded-t-[2.5rem] p-6 shadow-2xl overflow-y-auto max-h-[85vh] relative tab-animate" style={{background: 'var(--cream)'}}>
                                <button onClick={() => setEditingDate(null)} className="absolute top-5 left-5 w-10 h-10 rounded-full flex items-center justify-center text-slate-500 bg-white shadow-sm border active:scale-95 transition" style={{borderColor:'rgba(0,0,0,0.05)'}}>
                                    <i className="fa-solid fa-xmark text-lg"></i>
                                </button>
                                <div className="text-center mb-6 mt-2">
                                    <h3 className="text-lg font-black" style={{color:'var(--navy)'}}>تعديل سجل اليوم</h3>
                                    <p className="text-xs font-bold mt-1" style={{color:'var(--gold-dark)'}}>
                                        {new Date(editingDate).toLocaleDateString('ar-EG', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})}
                                    </p>
                                </div>

                                <h4 className="text-[10px] font-black mb-3 px-1 uppercase tracking-widest" style={{color:'var(--teal)'}}>الفرائض والطاعات الأساسية</h4>
                                {[ 
                                    {k:'f', n:'الفجر', icon:'🌙'}, {k:'d', n:'الظهر', icon:'☀️'}, {k:'a', n:'العصر', icon:'🌤️'}, {k:'m', n:'المغرب', icon:'🌅'}, {k:'i', n:'العشاء', icon:'⭐'},
                                    {k:'q', n:'الورد اليومي', icon:'📖'}, {k:'az', n:'أذكار الصباح والمساء', icon:'🤲'}, {k:'sw', n:'الصلاة على النبي ﷺ', icon:'💚'}, {k:'ist', n:'الاستغفار', icon:'📿'}
                                ].map(p => (
                                    <div key={p.k} onClick={() => toggle(p.k, editingDate)} className={`flex items-center justify-between p-3.5 mb-2 rounded-2xl border-2 transition-all cursor-pointer active:scale-[0.98] ${habits[editingDate+p.k] ? 'habit-done' : 'bg-white'}`} style={!habits[editingDate+p.k] ? {borderColor:'rgba(0,0,0,0.06)'} : {}}>
                                        <div className="flex items-center gap-3">
                                            <span className="text-xl">{p.icon}</span><span className="font-bold text-sm" style={{color:'var(--navy)'}}>{p.n}</span>
                                        </div>
                                        <div className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center transition-all ${habits[editingDate+p.k] ? 'border-0' : ''}`} style={habits[editingDate+p.k] ? {background:'var(--gold)', color:'white'} : {borderColor:'#E5E7EB'}}>{habits[editingDate+p.k] ? <i className="fa-solid fa-check text-xs"></i> : ''}</div>
                                    </div>
                                ))}
                                
                                <h4 className="text-[10px] font-black mt-6 mb-3 px-1 uppercase tracking-widest" style={{color:'var(--teal)'}}>السنن والصيام</h4>
                                {SUNNAH_LIST.map(s => (
                                    <div key={s.k} onClick={() => toggleSunnah(s.k, editingDate)} className={`flex items-center justify-between p-3.5 mb-2 rounded-2xl border-2 transition-all cursor-pointer active:scale-[0.98] ${sunnahHabits[editingDate+s.k] ? 'sunnah-done' : 'bg-white'}`} style={!sunnahHabits[editingDate+s.k] ? {borderColor:'rgba(0,0,0,0.06)'} : {}}>
                                        <div className="flex items-center gap-3"><span className="text-xl">{s.icon}</span><span className="font-bold text-sm" style={{color:'var(--navy)'}}>{s.n}</span></div>
                                        <div className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center transition-all ${sunnahHabits[editingDate+s.k] ? 'border-0' : ''}`} style={sunnahHabits[editingDate+s.k] ? {background:'var(--teal)', color:'white'} : {borderColor:'#E5E7EB'}}>{sunnahHabits[editingDate+s.k] ? <i className="fa-solid fa-check text-xs"></i> : ''}</div>
                                    </div>
                                ))}
                                
                                <div className="flex gap-2 pb-8 pt-4">
                                    <button onClick={() => deleteDailyRecord(editingDate)} title="حذف سجل هذا اليوم" className="w-14 h-14 shrink-0 rounded-2xl flex items-center justify-center text-rose-500 bg-rose-50 border border-rose-100 active:scale-95 transition">
                                        <i className="fa-solid fa-trash"></i>
                                    </button>
                                    <button onClick={() => setEditingDate(null)} className="flex-1 p-4 rounded-2xl font-black text-white shadow-lg active:scale-95 transition text-sm" style={{background:'linear-gradient(135deg, var(--teal-light), var(--teal))'}}>إغلاق وحفظ التعديلات</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* شريط التنقل السفلي (يختفي عندما تقرأ صفحة لتوفير مساحة أكبر) */}
                    {!readingPage && (
                        <nav className="fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl border-t flex items-center justify-between px-3 z-50 shadow-2xl" style={{height:'80px', borderRadius:'2rem 2rem 0 0', borderColor:'rgba(0,0,0,0.06)'}}>
                            <button onClick={() => setActiveTab('calendar')} className={`flex flex-col items-center gap-1.5 transition-all w-12 ${activeTab === 'calendar' ? 'nav-btn-active' : 'text-slate-300'}`}><i className="fa-solid fa-calendar-days text-xl"></i><span className="text-[7px] font-black uppercase">التقويم</span></button>
                            <button onClick={() => setActiveTab('quran')} className={`flex flex-col items-center gap-1.5 transition-all w-12 ${activeTab === 'quran' ? 'nav-btn-active' : 'text-slate-300'}`}><i className="fa-solid fa-book-quran text-xl"></i><span className="text-[7px] font-black uppercase">المصحف</span></button>
                            
                            <button onClick={() => setActiveTab('today')} className="relative -top-8 active:scale-90 transition-transform mx-2"><div className={`w-16 h-16 rounded-full flex items-center justify-center shadow-2xl border-4 border-white transition-all pulse-gold`} style={{background: activeTab === 'today' ? 'linear-gradient(135deg, var(--navy), var(--navy-light))' : '#E5E7EB'}}><span className="text-2xl">🕌</span></div></button>
                            
                            <button onClick={() => setActiveTab('sunnah')} className={`flex flex-col items-center gap-1.5 transition-all w-12 ${activeTab === 'sunnah' ? 'nav-btn-active' : 'text-slate-300'}`}><i className="fa-solid fa-star-and-crescent text-xl"></i><span className="text-[7px] font-black uppercase">السنن</span></button>
                            <button onClick={() => setActiveTab('vocab')} className={`flex flex-col items-center gap-1.5 transition-all w-12 ${activeTab === 'vocab' ? 'nav-btn-active' : 'text-slate-300'}`}><i className="fa-solid fa-book text-xl"></i><span className="text-[7px] font-black uppercase">المفردات</span></button>
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
