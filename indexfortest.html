const DB_NAME = "ZadQuranDB";
const STORE_NAME = "Pages";
const openOfflineDB = () => new Promise((resolve, reject) => {
  const request = window.indexedDB.open(DB_NAME, 1);
  request.onerror = () => reject(request.error);
  request.onsuccess = () => resolve(request.result);
  request.onupgradeneeded = (e) => {
    const db = e.target.result;
    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
  };
});
const saveQuranToOfflineDB = async (pagesObject) => {
  const db = await openOfflineDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    for (const pageNum in pagesObject) store.put(pagesObject[pageNum], parseInt(pageNum));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
};
const getPageFromOfflineDB = async (pageNum) => {
  const db = await openOfflineDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const request = store.get(pageNum);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
};
const checkQuranExistsOffline = async () => {
  const db = await openOfflineDB();
  return new Promise((resolve) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const request = store.count();
    request.onsuccess = () => resolve(request.result >= 604);
    request.onerror = () => resolve(false);
  });
};
const deleteOfflineQuran = async () => {
  const db = await openOfflineDB();
  return new Promise((resolve) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    const request = store.clear();
    request.onsuccess = () => resolve();
    request.onerror = () => resolve();
  });
};
const getQiblaBearing = (lat, lng) => {
  const meccaLat = 21.422487 * (Math.PI / 180);
  const meccaLng = 39.826206 * (Math.PI / 180);
  const latRad = lat * (Math.PI / 180);
  const dLng = meccaLng - (lng * (Math.PI / 180));
  const y = Math.sin(dLng) * Math.cos(meccaLat);
  const x = Math.cos(latRad) * Math.sin(meccaLat) - Math.sin(latRad) * Math.cos(meccaLat) * Math.cos(dLng);
  let bearing = Math.atan2(y, x) * (180 / Math.PI);
  return (bearing + 360) % 360;
};

  // دالة تطبيع النص العربي: تزيل التشكيل والمدود وتوحّد الحروف المتشابهة
  const normalizeArabic = (text) => {
    if (!text) return '';
    return text
      .replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g, '') // حذف كل التشكيل
      .replace(/[أإآٱ]/g, 'ا')    // توحيد الألف
      .replace(/ة/g, 'ه')          // تاء مربوطة → هاء
      .replace(/[يىئ]/g, 'ي')     // توحيد الياء
      .replace(/ؤ/g, 'و')          // واو همزة → واو
      .replace(/\u0627\u0644\u0644\u0647/g, 'الله') // الله
      .replace(/\s+/g, ' ')
      .trim();
  };

  // بناء قائمة استعلامات متعددة من النص الصوتي
  const buildSearchQueries = (transcript) => {
    const norm = normalizeArabic(transcript);
    const words = norm.split(' ').filter(w => w.length > 2);
    const queries = [];

    // الاستعلام الكامل أولاً
    if (norm.length > 3) queries.push(norm);

    // مجموعات من 4 كلمات متتالية
    for (let i = 0; i <= words.length - 4; i++) {
      queries.push(words.slice(i, i + 4).join(' '));
    }
    // مجموعات من 3 كلمات
    for (let i = 0; i <= words.length - 3; i++) {
      queries.push(words.slice(i, i + 3).join(' '));
    }
    // أطول كلمة منفردة (≥ 5 أحرف) كخيار أخير
    const longWords = words.filter(w => w.length >= 5).sort((a,b) => b.length - a.length);
    longWords.slice(0, 3).forEach(w => queries.push(w));

    // إزالة المكررات مع الحفاظ على الترتيب
    return [...new Set(queries)];
  };

  };

    try {

      for (const query of queries) {
        if (!query || query.length < 3) continue;

        if (match) {
          // استخدم رقم الصفحة من الـ API مباشرة إن وُجد، وإلا احسبه من SURAH_START_PAGES
          const pageNum = (match.page && match.page > 0) ? match.page : SURAH_START_PAGES[match.surah.number - 1];

            found: true,
            ayah_text: match.text,
            surah_num: match.surah.number,
            surah_name: match.surah.name,
            ayah_num: match.numberInSurah,
            page: pageNum
          });
          setRecogState('found');
          return;
        }
      }

      // المحاولة الأخيرة: البحث بدون تطبيع (النص الخام كما جاء من الميكروفون)
      const rawMatch = await searchInAPI(transcript.trim().split(' ').slice(0, 5).join(' '));

<p className="text-[9px] font-bold mb-2 px-1 leading-relaxed" style={darkStyles.textSub}>عدّل الوقت ليطابق مسجد الحي، وسيتم حفظ التعديل سحابياً.</p> <div className="rounded-2xl border p-2" style={darkStyles.bgWhite}> {['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].map(p => ( <div key={p} className="flex items-center justify-between p-2 border-b last:border-0" style={{borderColor:'rgba(255,255,255,0.05)'}}> <span className="font-bold text-sm" style={darkStyles.textMain}>{p==='Fajr'?'الفجر':p==='Dhuhr'?'الظهر':p==='Asr'?'العصر':p==='Maghrib'?'المغرب':'العشاء'}</span> <div className="flex items-center gap-3"> <button onClick={()=>changeOffset(p, -1)} className="w-8 h-8 rounded-lg bg-rose-50 text-rose-500 border border-rose-100 font-black">-</button> <span className="w-6 text-center font-black text-sm" style={darkStyles.textMain} dir="ltr">{prayerOffsets[p]>0?'+'+prayerOffsets[p]:prayerOffsets[p]}</span> <button onClick={()=>changeOffset(p, 1)} className="w-8 h-8 rounded-lg bg-emerald-50 text-teal-600 border border-emerald-100 font-black">+</button> </div> </div> ))} </div> </div> <div className="mb-6 border-t pt-6" style={{borderColor:'rgba(255,255,255,0.05)'}}> <h3 className="text-[10px] font-black uppercase tracking-widest mb-3 px-1 text-rose-500"><i className="fa-solid fa-triangle-exclamation"></i> منطقة الخطر</h3> <button onClick={resetAllRecords} className="w-full bg-rose-50 text-rose-600 p-4 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95 transition border border-rose-100"> <i className="fa-solid fa-trash-can"></i> تصفير جميع السجلات </button> </div> <div> <button onClick={() => auth.signOut()} className="w-full bg-slate-100 text-slate-600 p-4 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95 transition border border-slate-200" style={isDarkMode ? {background:'#1E293B', color:'#F8FAFC', borderColor:'#334155'} : {}}> <i className="fa-solid fa-arrow-right-from-bracket"></i> تسجيل الخروج </button> </div> </div> </div>}
        {!readingPage && activeTab === 'vocab' && <div className="tab-animate"> <div className="card-glass rounded-[2.5rem] p-5 shadow-lg border mb-6" style={{borderColor:'rgba(201,168,76,0.2)', background: isDarkMode ? 'rgba(30,41,59,0.95)' : 'linear-gradient(135deg, rgba(250,246,238,0.98), rgba(240,232,213,0.9))'}}> <h2 className="font-black text-sm mb-4 flex items-center gap-2" style={{color:'var(--gold-dark)'}}><i className="fa-solid fa-book-open text-base"></i> مفردة قرآنية جديدة</h2> <input value={newWord.w} onChange={e => setNewWord({...newWord, w:e.target.value})} className="w-full p-4 rounded-2xl mb-3 text-sm font-bold border" style={{...darkStyles.bgWhite, ...darkStyles.textMain, borderColor:'rgba(201,168,76,0.2)'}} placeholder="الكلمة أو العبارة..." /> <textarea value={newWord.m} onChange={e => setNewWord({...newWord, m:e.target.value})} className="w-full p-4 rounded-2xl mb-4 text-sm font-bold border h-24 resize-none" style={{...darkStyles.bgWhite, ...darkStyles.textMain, borderColor:'rgba(201,168,76,0.2)'}} placeholder="المعنى والشرح..."></textarea> <button onClick={() => { if(newWord.w && newWord.m) { setVocab([{...newWord, id:Date.now()}, ...vocab]); setNewWord({w:'', m:''}); } }} className="w-full p-4 rounded-2xl font-black text-white shadow-lg active:scale-95 transition text-sm" style={{background:'linear-gradient(135deg, var(--gold-dark), var(--gold))'}}>حفظ في السحابة</button> </div> <div className="space-y-3">{vocab.map(v => (<div key={v.id} className="p-5 rounded-[2rem] border-r-4 relative border" style={{...darkStyles.bgWhite, borderRightColor:'var(--gold)'}}><button onClick={() => setVocab(vocab.filter(x => x.id !== v.id))} className="absolute left-4 top-4 w-7 h-7 rounded-xl flex items-center justify-center text-xs transition-all" style={{color:'rgba(0,0,0,0.15)', background:'rgba(0,0,0,0.04)'}}><i className="fa-solid fa-xmark"></i></button><h4 className="font-black text-xl mb-2" style={darkStyles.textMain}>{v.w}</h4><p className="text-sm font-bold leading-relaxed p-3 rounded-2xl" style={{color: isDarkMode ? '#CBD5E1' : 'rgba(0,0,0,0.6)', background: isDarkMode ? '#0F172A' : 'rgba(250,246,238,0.8)'}}>{v.m}</p></div>))}</div> </div>}
      </main>
      {editingDate && ( <div className="fixed inset-0 z-[100] flex flex-col justify-end bg-black/60 backdrop-blur-sm" style={{animation: 'fadeIn 0.2s ease-out'}}> <div className="w-full max-w-md mx-auto rounded-t-[2.5rem] p-6 shadow-2xl overflow-y-auto max-h-[85vh] relative tab-animate" style={{background: 'var(--cream)'}}> <button onClick={() => setEditingDate(null)} className="absolute top-5 left-5 w-10 h-10 rounded-full flex items-center justify-center shadow-sm border active:scale-95 transition" style={{...darkStyles.bgWhite, ...darkStyles.textSub}}> <i className="fa-solid fa-xmark text-lg"></i> </button> <div className="text-center mb-6 mt-2"> <h3 className="text-lg font-black" style={darkStyles.textMain}>تعديل سجل اليوم</h3> <p className="text-xs font-bold mt-1" style={{color:'var(--gold-dark)'}}> {new Date(editingDate).toLocaleDateString('ar-EG', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})} </p> </div> <h4 className="text-[10px] font-black mb-3 px-1 uppercase tracking-widest" style={{color:'var(--teal)'}}>الفرائض والطاعات الأساسية</h4> {[ {k:'f', n:'الفجر', icon:'🌙'}, {k:'d', n:'الظهر', icon:'☀️'}, {k:'a', n:'العصر', icon:'🌤️'}, {k:'m', n:'المغرب', icon:'🌅'}, {k:'i', n:'العشاء', icon:'⭐'}, {k:'q', n:'الورد اليومي', icon:'📖'}, {k:'az', n:'أذكار الصباح والمساء', icon:'🤲'}, {k:'sw', n:'الصلاة على النبي ﷺ', icon:'💚'}, {k:'ist', n:'الاستغفار', icon:'📿'} ].map(p => ( <div key={p.k} onClick={() => toggle(p.k, editingDate)} className={`flex items-center justify-between p-3.5 mb-2 rounded-2xl border-2 transition-all cursor-pointer active:scale-[0.98] ${habits[editingDate+p.k] ? 'habit-done' : ''}`} style={habits[editingDate+p.k] ? {} : darkStyles.bgWhite}> <div className="flex items-center gap-3"> <span className="text-xl">{p.icon}</span><span className="font-bold text-sm" style={darkStyles.textMain}>{p.n}</span> </div> <div className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center transition-all ${habits[editingDate+p.k] ? 'border-0' : ''}`} style={habits[editingDate+p.k] ? {background:'var(--gold)', color:'white'} : {borderColor: isDarkMode ? '#334155' : '#E5E7EB'}}>{habits[editingDate+p.k] ? <i className="fa-solid fa-check text-xs"></i> : ''}</div> </div> ))} <h4 className="text-[10px] font-black mt-6 mb-3 px-1 uppercase tracking-widest" style={{color:'var(--teal)'}}>السنن والصيام</h4> {SUNNAH_LIST.map(s => ( <div key={s.k} onClick={() => toggleSunnah(s.k, editingDate)} className={`flex items-center justify-between p-3.5 mb-2 rounded-2xl border-2 transition-all cursor-pointer active:scale-[0.98] ${sunnahHabits[editingDate+s.k] ? 'sunnah-done' : ''}`} style={sunnahHabits[editingDate+s.k] ? {} : darkStyles.bgWhite}> <div className="flex items-center gap-3"><span className="text-xl">{s.icon}</span><span className="font-bold text-sm" style={darkStyles.textMain}>{s.n}</span></div> <div className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center transition-all ${sunnahHabits[editingDate+s.k] ? 'border-0' : ''}`} style={sunnahHabits[editingDate+s.k] ? {background:'var(--teal)', color:'white'} : {borderColor: isDarkMode ? '#334155' : '#E5E7EB'}}>{sunnahHabits[editingDate+s.k] ? <i className="fa-solid fa-check text-xs"></i> : ''}</div> </div> ))} <div className="flex gap-2 pb-8 pt-4"> <button onClick={() => deleteDailyRecord(editingDate)} title="حذف سجل هذا اليوم" className="w-14 h-14 shrink-0 rounded-2xl flex items-center justify-center text-rose-500 bg-rose-50 border border-rose-100 active:scale-95 transition"> <i className="fa-solid fa-trash"></i> </button> <button onClick={() => setEditingDate(null)} className="flex-1 p-4 rounded-2xl font-black text-white shadow-lg active:scale-95 transition text-sm" style={{background:'linear-gradient(135deg, var(--teal-light), var(--teal))'}}>إغلاق وحفظ التعديلات</button> </div> </div> </div> )}
      {!readingPage && ( <nav className="fixed bottom-0 w-full max-w-md backdrop-blur-xl border-t flex items-center justify-between px-3 z-50 shadow-2xl" style={{height:'80px', borderRadius:'2rem 2rem 0 0', borderColor:'rgba(255,255,255,0.05)', background: isDarkMode ? 'rgba(30,41,59,0.95)' : 'rgba(255,255,255,0.95)'}}> <button onClick={() => setActiveTab('calendar')} className={`flex flex-col items-center gap-1.5 transition-all w-12 ${activeTab === 'calendar' ? 'nav-btn-active' : 'text-slate-400'}`}><i className="fa-solid fa-calendar-days text-xl"></i><span className="text-[7px] font-black uppercase">التقويم</span></button> <button onClick={() => setActiveTab('quran')} className={`flex flex-col items-center gap-1.5 transition-all w-12 ${activeTab === 'quran' ? 'nav-btn-active' : 'text-slate-400'}`}><i className="fa-solid fa-book-quran text-xl"></i><span className="text-[7px] font-black uppercase">المصحف</span></button> <button onClick={() => setActiveTab('today')} className="relative -top-8 active:scale-90 transition-transform mx-2"><div className={`w-16 h-16 rounded-full flex items-center justify-center shadow-2xl border-4 transition-all pulse-gold`} style={{background: activeTab === 'today' ? 'linear-gradient(135deg, var(--navy), var(--navy-light))' : (isDarkMode ? '#334155' : '#E5E7EB'), borderColor: isDarkMode ? '#0F172A' : 'white'}}><span className="text-2xl">🕌</span></div></button> <button onClick={() => setActiveTab('sunnah')} className={`flex flex-col items-center gap-1.5 transition-all w-12 ${activeTab === 'sunnah' ? 'nav-btn-active' : 'text-slate-400'}`}><i className="fa-solid fa-star-and-crescent text-xl"></i><span className="text-[7px] font-black uppercase">السنن</span></button> <button onClick={() => setActiveTab('vocab')} className={`flex flex-col items-center gap-1.5 transition-all w-12 ${activeTab === 'vocab' ? 'nav-btn-active' : 'text-slate-400'}`}><i className="fa-solid fa-book text-xl"></i><span className="text-[7px] font-black uppercase">المفردا     </div>
