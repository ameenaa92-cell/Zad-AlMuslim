<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع أيقونة زاد المُسلم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #FAF6EE; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-[#0F1F3D] mb-2">أيقونة زاد المُسلم الجديدة</h1>
        <p class="text-sm font-bold text-[#8B6914]">تم التصميم خصيصاً لتطابق ألوان وتصميم تطبيقك</p>
    </div>

    <!-- حاوية الشعار (SVG) -->
    <div class="bg-white p-6 rounded-[3rem] shadow-2xl mb-8 border border-slate-100">
        <svg id="app-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="256" height="256" class="rounded-[22%] shadow-lg">
            <defs>
                <!-- خلفية كحلية متدرجة -->
                <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#1E3A5F" />
                    <stop offset="100%" stop-color="#0F1F3D" />
                </linearGradient>
                
                <!-- تدرج ذهبي فاخر -->
                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#F3DA8A" />
                    <stop offset="50%" stop-color="#C9A84C" />
                    <stop offset="100%" stop-color="#8B6914" />
                </linearGradient>

                <!-- قناع لصنع شكل الهلال المثالي -->
                <mask id="crescentMask">
                    <rect width="512" height="512" fill="white" />
                    <!-- الدائرة السوداء هي التي ستقطع من الدائرة الذهبية لصنع الهلال -->
                    <circle cx="180" cy="180" r="160" fill="black" />
                </mask>

                <!-- تأثير التوهج -->
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="8" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>

            <!-- مربع الخلفية بحواف دائرية -->
            <rect width="512" height="512" fill="url(#bgGrad)" />

            <!-- النجوم المتناثرة في الخلفية -->
            <circle cx="120" cy="100" r="3" fill="#C9A84C" opacity="0.6"/>
            <circle cx="400" cy="150" r="4" fill="#C9A84C" opacity="0.8"/>
            <circle cx="350" cy="80" r="2" fill="#FAF6EE" opacity="0.5"/>
            <circle cx="80" cy="250" r="2.5" fill="#FAF6EE" opacity="0.5"/>

            <!-- الهلال الذهبي الكبير -->
            <circle cx="256" cy="256" r="180" fill="url(#goldGrad)" mask="url(#crescentMask)" filter="url(#glow)"/>

            <!-- نجمة ثمانية داخل الهلال -->
            <path d="M 360 140 L 366 156 L 382 162 L 366 168 L 360 184 L 354 168 L 338 162 L 354 156 Z" fill="url(#goldGrad)" />

            <!-- قاعدة المسجد -->
            <rect x="96" y="400" width="320" height="112" fill="#162847" />
            <rect x="96" y="390" width="320" height="10" fill="url(#goldGrad)" />

            <!-- القبة الرئيسية (لون سكري) -->
            <path d="M 186 390 Q 186 250 256 190 Q 326 250 326 390 Z" fill="#FAF6EE" />
            
            <!-- ظل القبة (لإعطاء عمق 3D) -->
            <path d="M 256 190 Q 326 250 326 390 L 256 390 Z" fill="#E0D5C1" />

            <!-- نافذة القبة -->
            <path d="M 256 290 A 20 20 0 0 0 236 330 L 236 390 L 276 390 L 276 330 A 20 20 0 0 0 256 290 Z" fill="url(#goldGrad)" />
            <path d="M 256 290 A 20 20 0 0 0 256 330 L 256 390 L 276 390 L 276 330 A 20 20 0 0 0 256 290 Z" fill="#8B6914" opacity="0.5" />

            <!-- المئذنة اليمنى -->
            <rect x="350" y="240" width="24" height="150" fill="#FAF6EE" />
            <rect x="362" y="240" width="12" height="150" fill="#E0D5C1" />
            <polygon points="346,240 378,240 362,180" fill="url(#goldGrad)" />
            <rect x="344" y="300" width="36" height="8" fill="#162847" opacity="0.5"/>

            <!-- المئذنة اليسرى -->
            <rect x="138" y="260" width="20" height="130" fill="#FAF6EE" />
            <rect x="148" y="260" width="10" height="130" fill="#E0D5C1" />
            <polygon points="134,260 162,260 148,210" fill="url(#goldGrad)" />
            <rect x="132" y="320" width="32" height="6" fill="#162847" opacity="0.5"/>
        </svg>
    </div>

    <!-- أزرار التحكم -->
    <div class="flex flex-col gap-4 w-full max-w-xs">
        <button onclick="downloadLogo()" class="bg-[#2A7F6F] hover:bg-[#1E6053] text-white font-black py-4 px-6 rounded-2xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-3 text-lg">
            <i class="fa-solid fa-download"></i> تحميل الأيقونة (PNG)
        </button>
        <p class="text-xs text-center text-slate-500 font-bold leading-relaxed">اضغط للتحميل، ثم قم بتسمية الصورة <b>icon.png</b> وارفعها في مشروعك على Spck Editor بدلاً من القديمة.</p>
    </div>

    <script>
        function downloadLogo() {
            const svg = document.getElementById('app-logo');
            // استخراج كود الـ SVG
            const svgData = new XMLSerializer().serializeToString(svg);
            
            // إنشاء Canvas وهمي للرسم عليه
            const canvas = document.createElement("canvas");
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext("2d");
            
            const img = new Image();
            
            img.onload = function() {
                // رسم الـ SVG على الـ Canvas
                ctx.drawImage(img, 0, 0);
                
                // تحويل الـ Canvas إلى صورة PNG
                const pngFile = canvas.toDataURL("image/png");
                
                // إنشاء رابط تحميل مخفي والضغط عليه
                const downloadLink = document.createElement("a");
                downloadLink.download = "icon.png";
                downloadLink.href = pngFile;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            };
            
            // تحويل البيانات لتعمل على جميع المتصفحات
            img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
        }
    </script>
</body>
</html>
